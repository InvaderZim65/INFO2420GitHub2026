<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Event Handlers</title>
<script type="text/javascript">
	function MsgBox(text) {
		alert("The text you typed is: " + text);
	}
</script>
</head>

<body>
	<form name="myForm">
		<input name="myText" type="text" size="20" />
		<input name="submit" type="Button" value="Show Me" onMouseOver="MsgBox(myForm.myText.value)" />
	</form>
</body>
</html>
